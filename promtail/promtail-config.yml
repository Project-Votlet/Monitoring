server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all Docker container logs automatically
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: network
            values: ["violet-network"]
    relabel_configs:
      # Use container name as primary label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Extract service name from container name (violet-auth → auth)
      - source_labels: ['__meta_docker_container_name']
        regex: '/violet-(.*)'
        target_label: service
      # Compose project label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project
      # Compose service label
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service

    pipeline_stages:
      # ─────────────────────────────────────────────
      # Laravel JSON logs (Monolog JsonFormatter)
      # Format: {"message":"...","context":{},"level":200,"level_name":"INFO","channel":"production","datetime":"...","extra":{}}
      # ─────────────────────────────────────────────
      - match:
          selector: '{service=~"auth|profile|social|message|notification|space|webhook|bot|admin|media|reverb"}'
          stages:
            - json:
                expressions:
                  log_message: message
                  level: level_name
                  channel: channel
                  context: context
                  datetime: datetime
            # Use parsed level as a label for filtering
            - labels:
                level:
                channel:
            # Use the log message as the displayed line (not raw JSON)
            - output:
                source: log_message
            # Use Laravel's timestamp
            - timestamp:
                source: datetime
                format: "2006-01-02T15:04:05.000000Z"
                fallback_formats:
                  - "2006-01-02T15:04:05.999999999Z07:00"
                  - "2006-01-02 15:04:05"

      # ─────────────────────────────────────────────
      # artisan serve access logs (plain text)
      # Format: "GET /api/users 200" — keep as-is
      # ─────────────────────────────────────────────

      # ─────────────────────────────────────────────
      # Drop health check noise from all services
      # ─────────────────────────────────────────────
      - match:
          selector: '{service=~".+"}'
          stages:
            - drop:
                expression: '(GET|HEAD) /up'
                drop_counter_reason: health_check
            - drop:
                expression: 'GET /metrics'
                drop_counter_reason: metrics_scrape
