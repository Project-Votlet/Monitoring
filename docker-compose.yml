services:
  # ═══════════════════════════════════════
  # LOGS (Loki + Promtail)
  # ═══════════════════════════════════════

  loki:
    image: grafana/loki:3.4.2
    container_name: violet-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - violet
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    container_name: violet-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - violet
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════
  # METRICS (Prometheus + cAdvisor + Node Exporter)
  # ═══════════════════════════════════════

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: violet-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - violet
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: violet-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    ports:
      - "8088:8080"
    networks:
      - violet
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: violet-node-exporter
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"
    networks:
      - violet
    restart: unless-stopped

  # ═══════════════════════════════════════
  # DASHBOARD (Grafana)
  # ═══════════════════════════════════════

  grafana:
    image: grafana/grafana:11.5.2
    container_name: violet-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-violet2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3200}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/json/services-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3200:3000"
    networks:
      - violet
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:
  prometheus_data:

networks:
  violet:
    external: true
    name: violet-network
